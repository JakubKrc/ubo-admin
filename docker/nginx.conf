# Nginx config that runs INSIDE the production container.
# Public TLS termination happens on the homepage container;
# this one only speaks plain HTTP on port 80 within apps_net.

server {
    listen 80 default_server;
    server_name _;
    root /app/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 16m;

    # Trust the outer reverse proxy (homepage nginx) for forwarded headers.
    real_ip_header X-Forwarded-For;
    set_real_ip_from 172.16.0.0/12;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_log  /dev/stderr warn;
    access_log /dev/stdout;
}
