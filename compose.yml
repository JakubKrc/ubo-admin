services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ubo_admin
      DB_USERNAME: ubo_admin
      DB_PASSWORD: secret_local_only
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ubo_admin
      POSTGRES_USER: ubo_admin
      POSTGRES_PASSWORD: secret_local_only
    volumes:
      - dbdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ubo_admin"]
      interval: 5s
      retries: 10

volumes:
  dbdata:
